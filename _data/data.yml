experiences:
  title: Experiences
  info:
  - role: Senior QA Engineer
    time: Nov 2021 – Jul 2025
    company: Tata Consultancy Services (TCS), Pune
    details: |
      Worked for Credit Suisse AG (UBS Group) on Banking and Risk Analytics applications.      
        - Designed and executed manual and automated test cases for data-intensive applications.
        - Automated 200+ regression scenarios using Playwright with JavaScript.
        - Performed API testing using SoapUI/Postman and backend validation using SQL queries.
        - Validated end-to-end data pipelines across upstream and downstream systems.
        - Reduced regression testing effort by 40% through automation.
        - Identified critical defects and improved release quality in Agile Scrum environment.
        - Collaborated with developers, business analysts, and stakeholders during sprint cycles.
  - role: Software Test & Support Engineer
    time: Dec 2017 – Oct 2021
    company: Redivivus Technologies Pvt. Ltd., Pune
    details: |
      Worked on ERP, Pharma, Warehouse, HRMS, and Industrial Automation applications.
        - Executed end-to-end STLC activities including Functional, Integration, and Regression testing.
        - Performed database testing using SQL Server for data validation and integrity checks.
        - Worked on industrial automation systems integrated with PLCs, printers, and cameras.
        - Managed defect tracking using Jira and Bugzilla.
        - Supported production deployments and client issue resolution activities.
        - Improved defect leakage by 30% through effective testing strategies.
  - role: Web Developer
    time: Jun 2015 – Dec 2015
    company: Supernova Systems, Satara
    details: |
      - Developed CMS-based web applications using HTML, CSS, Bootstrap, and MySQL.
      - Worked on frontend UI development and database integration.
      - Gained practical experience in web application architecture and development lifecycle.

