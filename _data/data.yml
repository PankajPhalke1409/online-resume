career-profile:
  title: Career Profile
  summary: |
    Senior QA Engineer with 7.5+ years of experience in Manual and Automation Testing across Banking, Risk Analytics, ERP, and Enterprise applications. 
    Strong expertise in Playwright with JavaScript for UI automation, framework development, regression testing, and cross-browser testing. 
    Experienced in API Testing, SQL validation, CI/CD integration, Agile Scrum methodologies, and end-to-end software testing lifecycle. 
    Skilled in identifying critical defects, improving software quality, and delivering stable production releases in fast-paced Agile environments. 
    Proven ability to collaborate with cross-functional teams and deliver high-quality software solutions through strong analytical and problem-solving skills.
